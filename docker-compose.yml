version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CORS_ORIGINS=http://localhost,http://localhost:80
      - RATE_LIMIT_MAX=60
      - RATE_LIMIT_WINDOW=60000
      - UPLOAD_MAX_SIZE=10485760
    volumes:
      - uploads-data:/app/uploads
    restart: unless-stopped

volumes:
  uploads-data:
